<!DOCTYPE html>

<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Nueva Transacción - Gestor de Finanzas</title>
  <!-- Tailwind CSS CDN with Plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#10b77f',
              50: '#f0fdf7',
              100: '#dcfceb',
              200: '#bbf7d7',
              300: '#86efb8',
              400: '#4ade99',
              500: '#10b77f',
              600: '#059666',
              700: '#047855',
              800: '#065f46',
              900: '#064e3b',
              950: '#022c21',
            },
          },
          borderRadius: {
            'none': '0',
            'sm': '0.125rem',
            DEFAULT: '8px',
            'md': '0.375rem',
            'lg': '0.5rem',
            'xl': '0.75rem',
            '2xl': '1rem',
            '3xl': '1.5rem',
            'full': '9999px',
          }
        }
      }
    }
  </script>
  <!-- Font Awesome for Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <style data-purpose="custom-transitions">
    body {
      font-family: 'Inter', sans-serif;
    }

    .transition-all {
      transition: all 0.3s ease;
    }

    .income-active {
      color: #10b77f;
      border-bottom: 2px solid #10b77f;
    }

    .expense-active {
      color: #ef4444;
      border-bottom: 2px solid #ef4444;
    }
  </style>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen flex overflow-hidden">
  <!-- BEGIN: Sidebar Navigation -->
  <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex border-r border-slate-800"  data-component="../components/sidemenu.html"  data-purpose="sidebar"> </aside>
  <!-- END: Sidebar Navigation -->
  <!-- Main content area -->
  <div class="flex-1 flex flex-col h-screen overflow-y-auto p-4 md:p-8 items-center justify-center">
    <!-- BEGIN: MainContainer -->
    <main class="w-full max-w-3xl bg-slate-900 rounded-lg shadow-2xl overflow-hidden border border-slate-800"
      data-purpose="transaction-form-container">
      <!-- BEGIN: HeaderTabs -->
      <header class="flex border-b border-slate-800" data-purpose="transaction-type-switcher">
        <button class="flex-1 py-4 text-center font-semibold text-lg expense-active transition-all" id="expenseTab"
          onclick="switchType('expense')">
          <i class="fa-solid fa-arrow-up-from-bracket mr-2"></i>Gasto
        </button>
        <button
          class="flex-1 py-4 text-center font-semibold text-lg text-slate-500 hover:bg-slate-800/50 transition-all"
          id="incomeTab" onclick="switchType('income')">
          <i class="fa-solid fa-arrow-down-to-bracket mr-2"></i>Ingreso
        </button>
      </header>
      <!-- END: HeaderTabs -->
      <div class="p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- BEGIN: InputForm -->
        <section data-purpose="input-section">
          <form class="space-y-5" id="transactionForm">
            <!-- Amount Input -->
            <div>
              <label class="block text-sm font-medium text-slate-400 mb-1" for="amount">Monto</label>
              <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 font-bold">$</span>
                <input
                  class="w-full pl-8 pr-4 py-2 rounded-lg bg-slate-950 border-slate-800 text-slate-200 focus:ring-2 focus:ring-brand focus:border-brand transition-all"
                  id="amount" oninput="updatePreview()" placeholder="0.00" step="0.01" type="number" />
              </div>
            </div>
            <!-- Date Input -->
            <div>
              <label class="block text-sm font-medium text-slate-400 mb-1" for="date">Fecha</label>
              <input
                class="w-full px-4 py-2 rounded-lg bg-slate-950 border-slate-800 text-slate-200 focus:ring-2 focus:ring-brand focus:border-brand transition-all [color-scheme:dark]"
                id="date" oninput="updatePreview()" type="date" />
            </div>
            <!-- Account Selection -->
            <div>
              <label class="block text-sm font-medium text-slate-400 mb-1" for="account">Cuenta</label>
              <select
                class="w-full px-4 py-2 rounded-lg bg-slate-950 border-slate-800 text-slate-200 focus:ring-2 focus:ring-brand focus:border-brand transition-all"
                id="account" onchange="updatePreview()">
                <option value="Efectivo">💵 Efectivo</option>
                <option value="Banco Principal">🏦 Banco Principal</option>
                <option value="Ahorros">💰 Ahorros</option>
                <option value="Tarjeta de Crédito">💳 Tarjeta de Crédito</option>
              </select>
            </div>
            <!-- Category Selection -->
            <div>
              <label class="block text-sm font-medium text-slate-400 mb-1" for="category">Categoría</label>
              <select
                class="w-full px-4 py-2 rounded-lg bg-slate-950 border-slate-800 text-slate-200 focus:ring-2 focus:ring-brand focus:border-brand transition-all"
                id="category" onchange="updatePreview()">
                <option data-icon="fa-utensils" value="Comida y Bebida">🍴 Comida y Bebida</option>
                <option data-icon="fa-bag-shopping" value="Compras">🛍️ Compras</option>
                <option data-icon="fa-car" value="Transporte">🚗 Transporte</option>
                <option data-icon="fa-film" value="Entretenimiento">🎬 Entretenimiento</option>
                <option data-icon="fa-money-bill-wave" value="Salario">💸 Salario</option>
                <option data-icon="fa-house" value="Alquiler">🏠 Alquiler</option>
              </select>
            </div>
            <!-- Note Field -->
            <div>
              <label class="block text-sm font-medium text-slate-400 mb-1" for="note">Nota / Descripción</label>
              <textarea
                class="w-full px-4 py-2 rounded-lg bg-slate-950 border-slate-800 text-slate-200 focus:ring-2 focus:ring-brand focus:border-brand transition-all"
                id="note" oninput="updatePreview()" placeholder="Añadir una descripción..." rows="3"></textarea>
            </div>
            <button
              class="w-full py-3 bg-brand text-white font-bold rounded-lg hover:bg-brand-600 transition-colors shadow-lg shadow-brand/20"
              type="button">
              Guardar Transacción
            </button>
          </form>
        </section>
        <!-- END: InputForm -->
        <!-- BEGIN: LivePreview -->
        <section class="flex flex-col" data-purpose="preview-section">
          <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Vista Previa</h3>
          <div
            class="flex-1 bg-slate-950/50 border-2 border-dashed border-slate-800 rounded-lg p-6 flex flex-col justify-center items-center text-center space-y-4"
            id="previewCard">
            <!-- This icon changes based on category -->
            <div
              class="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center text-2xl shadow-inner border border-slate-800 text-slate-400"
              id="previewIcon">
              <i class="fa-solid fa-receipt"></i>
            </div>
            <div>
              <p class="text-3xl font-bold text-red-500" id="previewAmount">-$0.00</p>
              <p class="text-slate-300 font-medium" id="previewCategory">Seleccionar Categoría</p>
            </div>
            <div class="w-full pt-4 border-t border-slate-800 text-sm text-slate-500 space-y-1">
              <div class="flex justify-between">
                <span>Cuenta:</span>
                <span class="font-semibold text-slate-300" id="previewAccount">Efectivo</span>
              </div>
              <div class="flex justify-between">
                <span>Fecha:</span>
                <span class="font-semibold text-slate-300" id="previewDate">--/--/----</span>
              </div>
            </div>
            <p class="text-xs italic text-slate-600 line-clamp-2" id="previewNote">No hay descripción...</p>
          </div>
        </section>
        <!-- END: LivePreview -->
      </div>
    </main>
    <!-- END: MainContainer -->
  </div>
  <script data-purpose="ui-logic">
    let currentType = 'expense';

    function switchType(type) {
      currentType = type;
      const expenseTab = document.getElementById('expenseTab');
      const incomeTab = document.getElementById('incomeTab');

      if (type === 'income') {
        incomeTab.classList.add('income-active');
        incomeTab.classList.remove('text-slate-500');
        expenseTab.classList.remove('expense-active');
        expenseTab.classList.add('text-slate-500');
      } else {
        expenseTab.classList.add('expense-active');
        expenseTab.classList.remove('text-slate-500');
        incomeTab.classList.remove('income-active');
        incomeTab.classList.add('text-slate-500');
      }
      updatePreview();
    }

    function updatePreview() {
      const amount = document.getElementById('amount').value || '0.00';
      const date = document.getElementById('date').value || 'Sin fecha';
      const account = document.getElementById('account').value;
      const categorySelect = document.getElementById('category');
      const categoryName = categorySelect.value;
      const note = document.getElementById('note').value || 'No hay descripción...';

      // Update Amount Display
      const amountEl = document.getElementById('previewAmount');
      if (currentType === 'expense') {
        amountEl.innerText = `-$${amount}`;
        amountEl.classList.remove('text-brand');
        amountEl.classList.add('text-red-500');
      } else {
        amountEl.innerText = `+$${amount}`;
        amountEl.classList.remove('text-red-500');
        amountEl.classList.add('text-brand');
      }

      // Update Other Fields
      document.getElementById('previewCategory').innerText = categoryName;
      document.getElementById('previewAccount').innerText = account;
      document.getElementById('previewDate').innerText = date;
      document.getElementById('previewNote').innerText = note;

      // Update Icon (Simple Logic for this demo)
      const iconMap = {
        'Comida y Bebida': 'fa-utensils',
        'Compras': 'fa-bag-shopping',
        'Transporte': 'fa-car',
        'Entretenimiento': 'fa-film',
        'Salario': 'fa-money-bill-wave',
        'Alquiler': 'fa-house'
      };

      const iconClass = iconMap[categoryName] || 'fa-receipt';
      document.getElementById('previewIcon').innerHTML = `<i class="fa-solid ${iconClass}"></i>`;
    }

    // Initialize date field to today
    window.onload = () => {
      const today = new Date().toISOString().split('T')[0];
      if (document.getElementById('date')) {
        document.getElementById('date').value = today;
      }
      updatePreview();
    };
  </script>
</body>

</html>

<script src="../js/loadmenu.js"></script>
